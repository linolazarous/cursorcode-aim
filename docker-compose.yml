version: "3.9"

services:
  orchestrator:
    build: ./backend
    container_name: cursorcode_orchestrator
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    restart: always

  nginx:
    image: nginx:alpine
    container_name: cursorcode_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend_preview
      - frontend_preview
    restart: always

  mongodb:
    image: mongo:6
    container_name: cursorcode_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
